<style>
:root{
  --bg1:#f3ecfb; --bg2:#fdf2f0; --card:#ffffff;
  --ink:#3a2b4f; --ink-soft:#8a7da0;
  --grape:#a64fc9; --grape-deep:#6f2f93; --orchid:#c861d9; --lilac:#efd9ff;
  --mint:#3fd6a8; --gold:#ffc23f; --tangerine:#ff8a3f; --pink:#ff7ec9; --blue:#5b8ff5;
  --shadow:rgba(111,47,147,.16);
}
[data-theme="sunset"]{ --bg1:#fff0e6; --bg2:#ffe3ec; --grape:#ff7e79; --grape-deep:#c8530f; --orchid:#ff9a8b; --lilac:#ffe0d6; --shadow:rgba(200,83,15,.16);}
[data-theme="ocean"]{ --bg1:#e3f7ff; --bg2:#e6fff5; --grape:#1aa6bd; --grape-deep:#0f6f7e; --orchid:#46c4d6; --lilac:#d2f0f7; --ink:#234a55; --ink-soft:#5d8893; --shadow:rgba(15,111,126,.16);}
[data-theme="bubblegum"]{ --bg1:#ffe9f8; --bg2:#efe6ff; --grape:#ff5b9e; --grape-deep:#b43378; --orchid:#c861d9; --lilac:#ffd9ee; --shadow:rgba(180,51,120,.16);}
[data-theme="forest"]{ --bg1:#ecf7e6; --bg2:#f6f7df; --grape:#5a9e3e; --grape-deep:#3a6f2a; --orchid:#8bc34a; --lilac:#ddeccb; --ink:#33452f; --ink-soft:#6f8767; --shadow:rgba(58,111,42,.16);}
[data-theme="night"]{ --bg1:#2b2c4a; --bg2:#3a3d6b; --card:#34355a; --ink:#f1ecff; --ink-soft:#b6b0d8; --grape:#b07cff; --grape-deep:#d7c4ff; --orchid:#8fb0ff; --lilac:#4a4a7a; --shadow:rgba(0,0,0,.35);}
[data-theme="cotton"]{ --bg1:#fdeafb; --bg2:#eafbff; --grape:#e06fc4; --grape-deep:#a83e8c; --orchid:#7ec8e0; --lilac:#f7dcf1; --shadow:rgba(168,62,140,.15);}
[data-theme="lemon"]{ --bg1:#fffbe0; --bg2:#fff0e6; --grape:#f0a500; --grape-deep:#b06f00; --orchid:#ffca3a; --lilac:#fbeeb8; --ink:#4a3f22; --ink-soft:#8a7a50; --shadow:rgba(176,111,0,.14);}
[data-theme="mint"]{ --bg1:#e6fff2; --bg2:#eafff7; --grape:#20b48a; --grape-deep:#127a5c; --orchid:#5ed6b0; --lilac:#c8f0e2; --ink:#22463c; --ink-soft:#5d8b7d; --shadow:rgba(18,122,92,.15);}
[data-theme="lavender"]{ --bg1:#f1eaff; --bg2:#faf0ff; --grape:#9d6ee0; --grape-deep:#6f42b0; --orchid:#c08fe8; --lilac:#e6d9fb; --shadow:rgba(111,66,176,.15);}
[data-theme="peach"]{ --bg1:#ffeee4; --bg2:#ffe8ee; --grape:#ff8a5b; --grape-deep:#d1592b; --orchid:#ffb08b; --lilac:#ffdcc8; --shadow:rgba(209,89,43,.15);}
[data-theme="berry"]{ --bg1:#ffe6ee; --bg2:#f3e6ff; --grape:#d63384; --grape-deep:#9c2062; --orchid:#c861d9; --lilac:#f7d0e4; --shadow:rgba(156,32,98,.15);}

*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  font-family:'Nunito',system-ui,-apple-system,sans-serif; color:var(--ink);
  background:linear-gradient(170deg,var(--bg1),var(--bg2)); background-attachment:fixed;
  -webkit-font-smoothing:antialiased; min-height:100dvh; transition:background .5s;
}
#screen{max-width:470px;margin:0 auto;min-height:100dvh;padding-bottom:72px}
h1,h2,h3,.disp{font-family:'Baloo 2',cursive;margin:0}
.pad{padding:0 18px 40px}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* top chips */
.toprow{display:flex;align-items:center;gap:8px;padding:14px 18px 6px}
.pointchip,.streakpill{background:var(--card);border-radius:999px;padding:8px 14px;font-weight:800;box-shadow:0 4px 12px var(--shadow);font-size:15px}
.streakpill{color:var(--tangerine)}
.back{background:var(--card);border:none;border-radius:999px;width:42px;height:42px;font-size:22px;cursor:pointer;box-shadow:0 4px 12px var(--shadow);color:var(--ink);flex:none}
.back:focus-visible,button:focus-visible{outline:4px solid var(--grape);outline-offset:2px}
.spacer{flex:1}

/* hero / home */
.hero-name{font-family:'Baloo 2';font-size:15px;font-weight:700;color:var(--grape);letter-spacing:.5px;text-transform:uppercase;opacity:.9}
.hello{font-family:'Baloo 2';font-size:30px;color:var(--grape-deep);margin-top:-2px}
.duo{display:flex;justify-content:center;align-items:flex-end;gap:6px}
.char-wrap{display:flex;justify-content:center}
.char.idle{animation:bob 3.6s ease-in-out infinite}
.char.happy{animation:hop 1s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes hop{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
svg{display:block;overflow:visible}

.speech{background:var(--card);border-radius:20px;padding:14px 16px;box-shadow:0 6px 16px var(--shadow);font-weight:700;font-size:15px;line-height:1.45;position:relative;margin-top:8px}
.speech:before{content:"";position:absolute;top:-9px;left:40px;border:9px solid transparent;border-top:0;border-bottom-color:var(--card)}
.speech b{color:var(--grape-deep)}

.statrow{display:flex;gap:10px;margin-top:14px}
.statcard{flex:1;background:var(--card);border-radius:18px;padding:10px;text-align:center;box-shadow:0 4px 12px var(--shadow)}
.statnum{font-family:'Baloo 2';font-size:24px;color:var(--grape-deep);line-height:1}
.statlbl{font-size:10px;font-weight:800;color:var(--ink-soft);letter-spacing:.5px}

/* doors */
.door{width:100%;border:none;text-align:left;border-radius:22px;padding:16px;margin-top:11px;cursor:pointer;
  display:flex;align-items:center;gap:14px;box-shadow:0 7px 0 var(--shadow);transition:transform .08s, box-shadow .08s;color:var(--ink);background:var(--card)}
.door:active{transform:translateY(4px);box-shadow:0 3px 0 var(--shadow)}
.door .emoji{font-size:30px;width:46px;text-align:center;flex:none}
.door .dt{font-family:'Baloo 2';font-size:19px;font-weight:700}
.door .ds{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
.door.before{background:#eaf3ff}.door.during{background:#ffe7dd}.door.brave{background:#fff2d6}
.door.people{background:#eafaf3}.door.gratitude{background:#fff6df}
[data-theme="night"] .door{background:#3e3f68}[data-theme="night"] .door.before,[data-theme="night"] .door.during,[data-theme="night"] .door.brave,[data-theme="night"] .door.people,[data-theme="night"] .door.gratitude{background:#42436e}

.minirow{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
.minicard{flex:1;min-width:64px;background:var(--card);border:none;border-radius:16px;padding:12px 6px;cursor:pointer;box-shadow:0 4px 12px var(--shadow);color:var(--ink)}
.minicard .mi{font-size:24px}.minicard .ml{font-size:11.5px;font-weight:800;margin-top:3px}
.minicard.wearing{outline:3px solid var(--grape)}

/* steps */
.step-tag{display:inline-block;background:var(--lilac);color:var(--grape-deep);font-weight:800;font-size:11.5px;letter-spacing:.6px;padding:6px 12px;border-radius:999px;margin-top:6px}
.step-title{font-family:'Baloo 2';font-size:25px;color:var(--grape-deep);margin-top:10px;line-height:1.12}
.step-sub{color:var(--ink-soft);font-weight:700;font-size:14px;margin-top:6px;line-height:1.4}
.card{background:var(--card);border-radius:20px;padding:15px;box-shadow:0 6px 16px var(--shadow);margin-top:12px}
.card h3{color:var(--grape-deep);font-size:17px;margin:0 0 4px}
.card p{margin:0;font-weight:600;line-height:1.5;font-size:14.5px}
.card.tip{background:var(--lilac)}
[data-theme="night"] .card.tip{background:#45456f}

.choice{width:100%;border:none;background:var(--card);border-radius:16px;padding:14px;margin-top:10px;text-align:left;
  font-weight:700;font-size:15.5px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);display:flex;align-items:center;gap:12px;color:var(--ink);transition:transform .08s,box-shadow .08s}
.choice:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow)}
.choice.on{background:var(--grape);color:#fff}
.choice .ce{font-size:23px;flex:none}

.btn{width:100%;border:none;background:var(--grape);color:#fff;border-radius:18px;padding:15px;margin-top:14px;
  font-family:'Baloo 2';font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 0 var(--shadow);transition:transform .08s,box-shadow .08s}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow)}
.btn.go{background:var(--mint);color:#0f4536}
.btn.ghost{background:transparent;color:var(--ink-soft);box-shadow:none;font-size:15px;padding:10px;margin-top:8px}
.skipnote{color:var(--ink-soft);font-weight:700;font-size:12.5px;text-align:center;margin-top:12px;line-height:1.4}

input[type=text],input[type=email],textarea{width:100%;font-family:'Nunito';font-size:16px;font-weight:600;padding:13px;border-radius:14px;
  border:3px solid var(--lilac);background:var(--card);color:var(--ink);margin-top:10px}
textarea{min-height:90px;resize:vertical}
input:focus,textarea:focus{outline:none;border-color:var(--grape)}

/* meter */
.meter-num{font-family:'Baloo 2';font-size:80px;text-align:center;line-height:1;margin-top:10px}
.meter-word{text-align:center;font-weight:800;font-size:18px;margin-top:-2px}
input[type=range]{width:100%;margin-top:14px;accent-color:var(--grape);height:36px}
.scale-ends{display:flex;justify-content:space-between;color:var(--ink-soft);font-weight:800;font-size:12px;margin-top:2px}

/* big tools (fast pick) */
.bigtool{border-radius:20px;padding:18px;margin-top:12px;cursor:pointer;text-align:center;box-shadow:0 6px 0 var(--shadow);transition:transform .08s,box-shadow .08s;color:#fff}
.bigtool:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow)}
.bigtool .bt-e{font-size:34px}.bigtool .bt-t{font-family:'Baloo 2';font-weight:700;font-size:18px;margin-top:2px}
.bigtool.move{background:var(--blue)}.bigtool.dragon{background:var(--tangerine)}.bigtool.water{background:var(--mint);color:#0f4536}.bigtool.helpme{background:var(--grape)}

/* timer ring */
.timer-ring{position:relative;width:198px;height:198px;margin:14px auto 4px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-count{font-family:'Baloo 2';font-size:56px;color:var(--grape-deep);line-height:1}
.timer-label{font-weight:800;color:var(--ink-soft);font-size:13px}

/* breathing */
.breathe-word{font-family:'Baloo 2';font-size:30px;text-align:center;margin-top:18px;min-height:40px;color:var(--blue)}
.breathe-dot{width:60px;height:60px;border-radius:50%;margin:14px auto;background:radial-gradient(circle at 35% 30%,#fff,var(--blue));box-shadow:0 0 0 10px rgba(91,143,245,.18);transition:transform .2s}
.breathe-dot.go{animation:breathe 8s ease-in-out infinite}
@keyframes breathe{0%{transform:scale(1)}45%{transform:scale(2.4)}55%{transform:scale(2.4)}100%{transform:scale(1)}}

/* celebrate */
.celebrate{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;position:relative;overflow:hidden}
.celebrate h2{font-size:34px;color:var(--grape-deep)}
.celebrate .big{font-weight:700;font-size:16px;max-width:330px;margin-top:6px}
.pointpop{font-family:'Baloo 2';font-size:30px;color:var(--gold);margin-top:12px}
.ratepair{display:flex;align-items:center;gap:14px;margin-top:12px}
.ratebubble{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Baloo 2';font-size:24px}
.arrow{font-size:24px;color:var(--ink-soft)}
.confetti{position:absolute;top:-12px;width:9px;height:14px}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9}}
@keyframes bubbleRise{to{transform:translateY(-560px)}}
.gamefield{position:relative;height:54vh;max-height:460px;border:3px solid var(--ink);border-radius:18px;overflow:hidden}
.gamehud{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-top:10px;font-size:14px}
.mathprob{text-align:center;padding:12px;background:var(--gold);border:3px solid var(--ink);border-radius:14px;font-family:'Baloo 2';font-weight:800;font-size:28px;margin:8px 0;color:#5a4410}

/* chips + wins */
.chipwrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:var(--card);border:none;border-radius:999px;padding:9px 13px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 3px 8px var(--shadow);color:var(--ink)}
.bar{height:16px;border-radius:999px;background:rgba(0,0,0,.08);overflow:hidden;margin-top:10px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--grape));transition:width .4s}
.barrow{display:flex;align-items:center;gap:8px;margin-top:8px;font-weight:800;font-size:13px}
.barrow .mini{flex:1;height:13px;border-radius:999px;background:rgba(0,0,0,.08);overflow:hidden}
.barrow .mini>i{display:block;height:100%;background:var(--orchid)}
.logitem{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:11px;margin-top:8px;box-shadow:0 3px 10px var(--shadow)}
.lemoji{font-size:22px}.lt{font-weight:800;font-size:14px}.ls{font-size:12px;color:var(--ink-soft);font-weight:700}
.badge{margin-left:auto;background:var(--lilac);color:var(--grape-deep);font-weight:800;border-radius:999px;padding:5px 9px;font-size:12px}
.shrinkbox{background:var(--card);border-radius:20px;padding:16px;box-shadow:0 6px 16px var(--shadow);margin-top:12px}

.swatch{width:34px;height:34px;border-radius:10px;border:3px solid #fff;box-shadow:0 2px 6px var(--shadow);flex:none}
.shopitem{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px;box-shadow:0 4px 12px var(--shadow);margin-top:10px}
.tag{margin-left:auto;border:none;border-radius:999px;padding:9px 14px;font-weight:800;cursor:pointer;font-size:13.5px}
.tag.buy{background:var(--gold);color:#5a4410}.tag.use{background:var(--mint);color:#0f4536}.tag.on{background:transparent;color:var(--ink-soft)}

/* persistent footer + crisis help (on every screen, never gated) */
#appfoot{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:7px 12px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-top:1px solid rgba(0,0,0,.08)}
[data-theme="night"] #appfoot{background:rgba(28,28,46,.92);border-top-color:rgba(255,255,255,.12)}
#appfoot .fc{font-size:10.5px;color:#9aa0ab;text-align:center;line-height:1.2}
#appfoot .fh{flex:none;border:none;background:var(--coral,#ff5b6e);color:#fff;font-weight:800;font-size:12px;border-radius:999px;padding:6px 12px;cursor:pointer}
#appfoot .fh:focus-visible{outline:3px solid var(--grape);outline-offset:2px}
.legal h3{color:var(--grape-deep);font-size:16px;margin:0 0 6px}
.legal p{font-size:13.5px;line-height:1.5;margin:0}
.legal .small{font-size:12px;color:var(--ink-soft)}
.crisis-line{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:14px;margin-top:10px;box-shadow:0 4px 12px var(--shadow);font-weight:700;font-size:15px}
.crisis-line .ci{font-size:24px;flex:none}
.crisis-line a{color:var(--grape);font-weight:800;text-decoration:none}
#splash{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(170deg,#b794f6,#e6d6ff);transition:opacity .45s ease;text-align:center;padding:24px}
#splash .sn{font-family:'Baloo 2';font-size:36px;color:#fff;margin-top:10px;text-shadow:0 2px 8px rgba(111,47,147,.3)}
#splash .ss{color:#fff;font-weight:700;opacity:.95;margin-top:2px}
#splash .sc{color:#fff;font-weight:700;opacity:.8;font-size:12px;margin-top:18px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>

</div>

<script>
/* =========================================================
   Brave Battle — tester clubhouse (anger + worry) · characters: Bloom & Tangle
   Same spirit as Bubble. Self-contained, saves to this device.
   ========================================================= */
const $ = id => document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---- storage: saves on-device (loose file OR hosted) via localStorage;
   falls back to the Claude app's storage inside the preview, then memory ---- */
const Store={
  mode:'mem', mem:{},
  init(){
    try{const k='__pt_test__';localStorage.setItem(k,'1');localStorage.removeItem(k);this.mode='local';return;}catch(e){}
    if(typeof window!=='undefined'&&window.storage&&window.storage.get){this.mode='claude';return;}
    this.mode='mem';
  },
  async load(){try{
    if(this.mode==='local'){const v=localStorage.getItem('pt_state');return v?JSON.parse(v):null;}

function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayOffset(n){const d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function recordUsageDay(){const t=todayKey();if(!state.usedDays)state.usedDays={};const first=!state.usedDays[t];state.usedDays[t]=true;
  if(first){if(state.lastUseDay===dayOffset(1))state.streakCount++;else state.streakCount=1;state.lastUseDay=t;}}
function currentStreak(){if(state.lastUseDay===todayKey()||state.lastUseDay===dayOffset(1))return state.streakCount||0;return 0;}
function usageCounts(){const all=state.log.length;let day=0,week=0;const t=todayKey();const wk=Date.now()-7*864e5;
  state.log.forEach(e=>{const d=new Date(e.ts);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(k===t)day++;if(e.ts>=wk)week++;});
  return{day,week,all};}
function award(n){state.points+=n;state.totalPoints+=n;}

const Timer={iv:null,start(secs,onTick,onDone){this.stop();const total=secs;let start=Date.now();onTick(secs,total);
  this.iv=setInterval(()=>{const rem=Math.max(0,Math.round(total-(Date.now()-start)/1000));onTick(rem,total);if(rem<=0){this.stop();onDone&&onDone();}},250);},
  stop(){if(this.iv){clearInterval(this.iv);this.iv=null;}}};

renderers.about=()=>{screen.innerHTML=`${topbar()}<div class="pad fade legal"><span class="step-tag">ABOUT &amp; PARENT INFO 💜</span>

    <p>Helping children regulate their emotions, build confidence, and find coping skills that work for them — through tools they actually want to use, that capture real data from real moments to inform families, therapists, and kids together. Made accessible to every family who needs it.</p></div>
  <div class="card"><h3>About Brave Battle</h3>
    <p>This is a demo of <b>Brave Battle</b>, provided by Brave Kids United Inc, an Indiana nonprofit corporation. Brave Battle is designed to help children practice coping skills and build confidence when working through everyday emotional challenges such as anxiety and worry.</p>
    <p style="margin-top:8px">This demo is an early preview. The full Brave Battle app, when it launches, will include personalized features, character design, faith-level options, parent and therapist tools, and much more.</p></div>
  <div class="card"><h3>Inside the Grown-Ups area 🔒</h3>
    <p>The Grown-Ups area is your space, protected by a PIN you set — your child can\u2019t open it without the numbers. Inside, you\u2019ll find:</p>

  <div class="card"><h3>Choosing a faith level 🙏</h3>
    <p>Brave Battle is made for families of every faith and none. A grown-up picks the level in the Grown-Ups area, and your child only ever sees the content you\u2019ve chosen:</p>
    <p style="margin-top:8px">• <b>None</b> — fully secular. Warm encouragement only, with no faith language.<br>
    • <b>Light</b> (the default) — the Golden Rule and kindness. No scripture.<br>

    <p style="margin-top:8px">You can change this any time, and it takes effect right away. Choose whatever best fits your child and family.</p></div>
  <div class="card"><h3>Important — Not a Substitute for Care</h3>
    <p>Brave Battle is a support tool, not a replacement for professional care. It does not diagnose, treat, or cure any medical or psychological condition.</p>
    <p style="margin-top:8px">This app is not designed for use in crisis situations or for conditions that require professional treatment, including (but not limited to) trauma, eating disorders, severe depression, suicidal thoughts, self-harm, psychosis, or substance abuse. For any of these, please contact a licensed professional immediately.</p>
    <p style="margin-top:8px">Brave Kids United Inc and the Brave Battle team are not licensed mental health professionals. Content within Brave Battle does not constitute medical, psychological, or therapeutic advice.</p>
    <p style="margin-top:8px"><b>If your child is in crisis:</b><br>• Call or text <a href="tel:988" style="color:var(--grape);font-weight:800">988</a> (Suicide &amp; Crisis Lifeline)<br>• Text HOME to <a href="sms:741741" style="color:var(--grape);font-weight:800">741741</a> (Crisis Text Line)<br>• Call <a href="tel:911" style="color:var(--grape);font-weight:800">911</a> for emergencies</p></div>
  <div class="card"><h3>Your Data</h3>
    <p>This is a <b>demo (tester) version</b> of Brave Battle, and it is built to keep your child's information on the device.</p>
    <p style="margin-top:8px">• <b>No server, by design — for this demo.</b> This demo does not send anything anywhere. There is no account, no login, and no Brave Kids United Inc server collecting information — so nothing your child does in this demo travels back to us. We never receive it, and we can't see it.<br>
    • <b>Saved on this device only.</b> To make the app work, it stores a few things right on the device: their points and rewards, and anything they type in the app (like a gratitude note or a worry they check). This stays on the device and is visible only in the Grown-Ups area on that same device.<br>

    • <b>You're in control.</b> To erase everything, tap "Reset all data" in the Grown-Ups section, or clear this app's data from the device.</p>
    <p style="margin-top:8px">Because this demo collects nothing on our end, there is no data about your family for us to store, share, or delete.</p>
    <p style="margin-top:8px"><b>Looking ahead:</b> the full version of Brave Battle (still in development) is planned to include online features such as saved accounts, personalization, and parent and therapist tools, which will use a server. That future version will come with its own, updated privacy information before it is used — this notice covers the demo only.</p>
    <p style="margin-top:8px">Your feedback comes through talking with us directly, not through the app.</p></div>
  <div class="card"><h3>Contact / Feedback</h3>

  <div class="card" style="background:linear-gradient(160deg,#eaf6f8,#fff6df)"><h3>Stay connected 💛</h3>

/* ---- greeting ---- */
function checkedInToday(){const t=todayKey();return (state.moods||[]).some(m=>m.day===t);}
function todayMood(){const t=todayKey();return (state.moods||[]).find(m=>m.day===t)||{e:'🙂',t:'Okay'};}
const MOOD_TOOLS={
  'Mad':{tip:'When you\u2019re mad, moving the big energy out helps first.',ids:['move','squeeze','balloon']},
  'Worried':{tip:'When you\u2019re worried, slowing your body and naming the worry helps.',ids:['ground','balloon','tell']},
  'Sad':{tip:'When you\u2019re sad, comfort and connection help more than distraction.',ids:['tell','friend','kind']},
  'Meh':{tip:'A little movement or a small good deed can lift a meh mood.',ids:['move','kind','distract']}
};
function suggestForMood(t){const m=MOOD_TOOLS[t];if(!m)return;flow={section:'helpNow'};
  const tools=m.ids.map(id=>TOOLS.find(x=>x.id===id)).filter(Boolean).filter(x=>x.kind!=='faith'||faithOn());
  screen.innerHTML=`${topbar()}<div class="pad fade"><span class="step-tag">A FEW IDEAS 💜</span>
  <div class="step-title">Feeling ${esc(t.toLowerCase())}? Let\u2019s try one.</div>
  <div class="card tip"><p>${m.tip}</p></div>
  ${tools.map(t2=>`<button class="choice" onclick="pickTool('${t2.id}')"><span class="ce">${t2.e}</span>${esc(t2.id==='friend'?friendName():t2.name)}</button>`).join('')}
  <button class="btn ghost" onclick="go('toolList')">See all my tools 🧰</button></div>`;}
function doCheckin(i){const c=CHECKINS[i];if(!state.moods)state.moods=[];
  state.moods.unshift({day:todayKey(),ts:Date.now(),e:c.e,t:c.t});
  if(state.moods.length>200)state.moods=state.moods.slice(0,200);
  award(PTS.checkin);recordUsageDay();save();cachedGreeting=null;
  const low=(c.t==='Worried'||c.t==='Mad'||c.t==='Sad');
  screen.innerHTML=`<div class="celebrate" id="cb"><div style="font-size:34px">${c.e}</div>
    <h2>Thanks for telling me.</h2>
    <div class="duo" style="margin:10px 0">${pip('happy',100)}</div>
    <div class="big">${low?'That\u2019s a hard way to feel. I\u2019m really glad you said it out loud. Want to use a tool together?':'I love hearing that. Let\u2019s keep the good going!'}</div>
    <div class="pointpop">+${PTS.checkin} ⭐</div>
    ${low?`<button class="btn" style="max-width:260px" onclick="suggestForMood('${c.t}')">Yes, help me now 🔥</button>
      <button class="btn ghost" style="max-width:260px" onclick="go('home')">I\u2019m okay for now</button>`
    :`<button class="btn" style="max-width:260px" onclick="go('sunshine')">Go to Sunshine ☀️</button>
      <button class="btn ghost" style="max-width:260px" onclick="go('home')">Back home</button>`}</div>`;burst();}
function greeting(streak,u){const p=state.olderKids?["Hey — I\u2019m <b>Bloom</b>. Glad you\u2019re here.","Whatever today\u2019s been, we can take it a bit at a time.","However you\u2019re showing up right now is okay."]:["Hi, I\u2019m <b>Bloom</b>. I\u2019m so glad you came today.","Hey friend — whatever today is, I\u2019m right here with you."].concat(ENCOURAGE);
  if(streak>=3)p.push(`That\u2019s <b>${streak} days in a row</b> you\u2019ve come back. Showing up like that is real.`);
  if(u.week>=5)p.push(`You\u2019ve used your tools <b>${u.week} times this week</b>. You keep trying, even when it\u2019s hard.`);
  if(state.totalPoints>=40)p.push("Look at all you\u2019ve practiced. The brave you is growing every day.");
  if(state.log.length){const l=state.log[0];if(l.section==='brave')p.push("Last time you took a brave step. That stays with you.");
    if(l.rateAfter!=null&&l.rateBefore!=null&&l.rateAfter<l.rateBefore)p.push("Last time, your feeling came down. That was your hard work — not magic.");}
  return p[Math.floor(Math.random()*p.length)];}

/* ---- home ---- */
renderers.home=()=>{const streak=currentStreak();const u=usageCounts();if(!cachedGreeting)cachedGreeting=greeting(streak,u);
  screen.innerHTML=`<div class="toprow"><div class="streakpill" title="day streak">🔥 ${streak}</div><div class="spacer"></div><div class="pointchip">⭐ ${state.points}</div></div>
  <div class="pad fade"><div style="text-align:center"><div class="hero-name">Brave Battle</div>
    <div style="font-size:11.5px;font-weight:800;color:var(--ink-soft);letter-spacing:.06em;margin-top:-2px">BATTLE BIG FEELINGS, TOGETHER</div>
    <div class="hello">Hi, friend! 👋</div></div>
    <div class="duo" style="margin-top:4px">${pip('',120)}</div>
    <div class="speech">${cachedGreeting}</div>
    <div class="statrow">
      <div class="statcard"><div class="statnum">${u.day}</div><div class="statlbl">TODAY</div></div>

    ${checkedInToday()?`<div class="card" style="text-align:center;margin-top:12px"><p style="font-weight:800">Today you said you feel ${esc(todayMood().e)} ${esc(todayMood().t)}</p></div>`
      :`<div class="card" style="margin-top:12px"><h3 style="text-align:center">How are you today?</h3>
        <div class="chipwrap" style="justify-content:center;margin-top:8px">${CHECKINS.map((c,i)=>`<button class="chip" onclick="doCheckin(${i})">${c.e} ${c.t}</button>`).join('')}</div></div>`}
    <div style="height:6px"></div>

      <button class="minicard" onclick="go('gate')"><div class="mi">🔒</div><div class="ml">Grown-Ups</div></button></div>
    <button class="btn ghost" style="margin-top:10px" onclick="go('about')">About / Parent Info</button></div>`;};

/* ---- rate ---- */
renderers.rate=(d)=>{const after=d.when==='after';const start=after?Math.max(0,(flow.rateBefore!=null?flow.rateBefore:5)-2):5;
  const [tag,title]=after?['HOW BIG IS IT NOW?','How big is the feeling now?']:['HOW BIG IS IT?','How big does it feel?'];
  screen.innerHTML=`${topbar()}<div class="pad fade" style="text-align:center">
    <span class="step-tag">${tag}</span><div class="step-title">${title}</div>
    <div class="step-sub">${after?'You used your skill — let\u2019s see what changed.':'Slide to show how strong it feels.'}</div>
    <div class="duo" style="margin:6px auto">${tangle('',96,after?monsterMad():1)}</div>
    <div class="meter-num" id="mnum">${start}</div><div class="meter-word" id="mword"></div>
    <input type="range" min="0" max="10" value="${start}" id="sl" oninput="updMeter()">
    <div class="scale-ends"><span>0 · calm</span><span>10 · biggest</span></div>
    ${after&&flow.rateBefore!=null?`<div class="card"><p>Before, you said it was <b>${flow.rateBefore}</b>.</p></div>`:''}
    <button class="btn" onclick="rateDone('${d.when}')">${after?'That\u2019s how I feel now':'That\u2019s how it feels'}</button></div>`;
  updMeter();};
function updMeter(){const v=+$('sl').value,[w,c]=feelWord(v);$('mnum').textContent=v;$('mnum').style.color=c;$('mword').textContent=w;$('mword').style.color=c;}
function rateDone(when){const v=+$('sl').value;if(when==='after'){flow.rateAfter=v;finishFlow();}else{flow.rateBefore=v;
  if(flow.section==='brave')go('braveCalm');else if(flow.section==='feelComing')go('earlyPick');else go('helpPick');}}

/* ---- 1) I FEEL IT COMING ---- */
renderers.feelComing=()=>{flow={section:'feelComing'};const WLIST=state.olderKids?WARN_TEEN:WARN;screen.innerHTML=`${topbar()}<div class="pad fade">
  <span class="step-tag">CATCH IT EARLY 🌤️</span><div class="step-title">What are you noticing?</div>
  <div class="step-sub">You opened the app early — that\u2019s a big win already! 🌟</div>
  ${WLIST.map((w,i)=>`<button class="choice" onclick="pickWarn(${i})"><span class="ce">${w.e}</span>${esc(w.t)}</button>`).join('')}</div>`;};
function pickWarn(i){const WLIST=state.olderKids?WARN_TEEN:WARN;flow.warn=WLIST[i].t;go('rate',{when:'now'});}
renderers.earlyPick=()=>{let sk;const favs=(state.favs||[]).map(id=>TOOLS.find(t=>t.id===id)).filter(Boolean).filter(t=>t.kind!=='faith'||faithOn());
  if(favs.length){sk=favs.map(t=>({e:t.e,t:t.name,id:'tool:'+t.id}));}
  else{sk=[{e:'🎈',t:'Take 3 balloon breaths',id:'balloon'},{e:'💧',t:'Get a drink of water',id:'do'},{e:'🖐️',t:'Do 5-4-3-2-1 grounding',id:'ground'},{e:'🦋',t:'Give myself a butterfly hug',id:'butterfly'},{e:'🤝',t:'Tell a grown-up I trust',id:'do'},{e:'✊',t:'Squeeze and let go',id:'squeeze'}];}
  screen.innerHTML=`${topbar()}<div class="pad fade"><span class="step-tag">PICK ONE QUICK THING</span><div class="step-title">Catch it before it grows</div>
  ${sk.map((s,i)=>`<button class="choice" onclick="earlyDo(${i})"><span class="ce">${s.e}</span>${esc(s.t)}</button>`).join('')}
  <button class="btn ghost" onclick="go('toolList')">See all my tools 🧰</button></div>`;
  window._early=sk;};
function earlyDo(i){const s=window._early[i];flow.tool=s.t;
  if(s.id&&s.id.indexOf('tool:')===0){pickTool(s.id.slice(5));return;}
  if(s.id==='balloon')go('breathe',{next:'afterEarly'});
  else if(s.id==='ground')go('ground',{n:0});
  else if(s.id==='butterfly')go('butterfly');
  else if(s.id==='squeeze')go('squeeze',{n:0});
  else simpleDo(s.e,s.t,'afterEarly');}
function afterEarly(){go('rate',{when:'after'});}
function simpleDo(e,label,nextFn){screen.innerHTML=`${topbar()}<div class="pad fade" style="text-align:center">
  <span class="step-tag">TRY IT</span><div style="font-size:48px;margin-top:14px">${e}</div><div class="step-title">${esc(label)}</div>
  <div class="card"><p>Go ahead and do it now. Bloom is waiting right here. 💜</p></div>
  <div class="duo" style="margin:8px auto">${pip('',104)}</div>
  <button class="btn go" onclick="${nextFn}()">I did it! ✅</button></div>`;}

renderers.helpPick=()=>{screen.innerHTML=`${topbar()}<div class="pad fade" style="text-align:center">
  <span class="step-tag" style="background:#ffd6c2;color:#c8530f">PICK FAST 🔥</span><div class="step-title">Let\u2019s get your body to calm down</div>

  <div class="bigtool water" onclick="pickTool('water')"><div class="bt-e">🧊</div><div class="bt-t">COLD WATER</div></div>

  ${reveal?`<button class="btn" onclick="renderers.jokeT()">Another one 🥁</button>`:`<button class="btn" onclick="renderJoke(true)">Tell me! 🥁</button>`}
  <button class="btn ghost" onclick="goBack()">← Back to distractions</button></div>`;}

/* bubble pop game */
let bpInt,bpSpawn,bpCount,bpEnd;
renderers.bubblePop=()=>{bpCount=0;bpEnd=Date.now()+60000;
  screen.innerHTML=`${topbar()}<div class="pad fade"><span class="step-tag">POP THE BUBBLES 🫧</span>
   <div class="gamehud"><div><span id="bpc">0</span> popped! 🫧</div><div>⏱ <span id="bpt">1:00</span></div></div>
   <div id="bfield" class="gamefield" style="background:linear-gradient(180deg,#C6E5F5,#E8F6FF)"></div>
   <button class="btn ghost" onclick="endBubblePop()">Stop early</button></div>`;
  bpSpawn=setInterval(spawnBubble,350);
  bpInt=setInterval(()=>{const r=Math.max(0,Math.ceil((bpEnd-Date.now())/1000));const el=$('bpt');if(el){const m=Math.floor(r/60),s=r%60;el.textContent=m+':'+(s<10?'0':'')+s;}if(r<=0)endBubblePop();},250);};
function spawnBubble(){const f=$('bfield');if(!f)return;const rect=f.getBoundingClientRect();const size=30+Math.floor(Math.random()*50);const left=Math.random()*Math.max(10,rect.width-size);const dur=4+Math.random()*3;
  const cols=['rgba(167,200,232,.85)','rgba(255,180,192,.85)','rgba(255,201,74,.85)','rgba(125,211,181,.85)','rgba(232,214,255,.85)'];const color=cols[Math.floor(Math.random()*cols.length)];
  const b=document.createElement('div');b.style.cssText=`position:absolute;left:${left}px;bottom:-${size}px;width:${size}px;height:${size}px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.9),${color});border:2px solid rgba(26,26,26,.55);box-shadow:inset -4px -4px 8px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.15);animation:bubbleRise ${dur}s linear forwards;cursor:pointer;touch-action:manipulation`;
  const pop=(ev)=>{ev.stopPropagation();if(!b.parentNode)return;bpCount++;const c=$('bpc');if(c)c.textContent=bpCount;popSound();popBubble(b);};
  b.addEventListener('click',pop);b.addEventListener('touchstart',pop,{passive:true});f.appendChild(b);
  setTimeout(()=>{if(b.parentNode)b.remove();},dur*1000+120);}
function endBubblePop(){stopGames();
  screen.innerHTML=`${topbar()}<div class="pad fade" style="text-align:center"><span class="step-tag">NICE POPPING! 🫧</span>
   <div style="font-size:54px;font-family:'Baloo 2';font-weight:800;color:var(--grape-deep);margin:18px">${bpCount}</div><p style="font-weight:700">bubbles popped!</p>
   <button class="btn" onclick="go('bubblePop')">Play again 🫧</button>
   <button class="btn ghost" onclick="go('distract')">← Back to distractions</button></div>`;}

/* math bubble pop */
let mInt,mSpawn,mScore,mStreak,mEnd,mAns,mOp='mix';
function mOpName(){return {'+':'Adding','−':'Subtracting','×':'Times','÷':'Dividing','mix':'Mix it up'}[mOp]||'Mix it up';}
renderers.mathPick=()=>{screen.innerHTML=`${topbar()}<div class="pad fade"><span class="step-tag">MATH BUBBLE POP 🔢</span>
   <div class="step-title">What do you want to practice?</div><div class="step-sub">Pop the bubble with the right answer!</div>
   <button class="choice" onclick="mOp='+';go('mathPop')"><span class="ce">➕</span>Adding</button>
   <button class="choice" onclick="mOp='−';go('mathPop')"><span class="ce">➖</span>Subtracting</button>
   <button class="choice" onclick="mOp='×';go('mathPop')"><span class="ce">✖️</span>Times (multiply)</button>
   <button class="choice" onclick="mOp='÷';go('mathPop')"><span class="ce">➗</span>Dividing</button>
   <button class="choice" onclick="mOp='mix';go('mathPop')"><span class="ce">🎲</span>Mix them all up</button></div>`;};
renderers.mathPop=()=>{mScore=0;mStreak=0;mEnd=Date.now()+60000;
  screen.innerHTML=`${topbar()}<div class="pad fade"><span class="step-tag">MATH POP · ${mOpName().toUpperCase()} 🔢</span>
   <div class="gamehud"><div>⭐ <span id="msc">0</span></div><div>🔥 <span id="mst">0</span></div><div>⏱ <span id="mtl">1:00</span></div></div>
   <div id="mprob" class="mathprob">—</div>
   <div id="mfield" class="gamefield" style="height:46vh;max-height:400px;background:linear-gradient(180deg,#E8D6FF,#F4E8FF)"></div>
   <button class="btn ghost" onclick="endMathPop()">Stop early</button></div>`;
  genMath();mSpawn=setInterval(spawnMathBubble,750);
  mInt=setInterval(()=>{const r=Math.max(0,Math.ceil((mEnd-Date.now())/1000));const el=$('mtl');if(el){const m=Math.floor(r/60),s=r%60;el.textContent=m+':'+(s<10?'0':'')+s;}if(r<=0)endMathPop();},250);};
function genMath(){const ops=['+','−','×','÷'];const op=(mOp==='mix')?ops[Math.floor(Math.random()*ops.length)]:mOp;let a,b,ans;
  if(op==='+'){a=2+Math.floor(Math.random()*18);b=2+Math.floor(Math.random()*18);ans=a+b;}
  else if(op==='−'){a=5+Math.floor(Math.random()*25);b=1+Math.floor(Math.random()*(a-1));ans=a-b;}
  else if(op==='×'){a=2+Math.floor(Math.random()*11);b=2+Math.floor(Math.random()*11);ans=a*b;}
  else{ans=2+Math.floor(Math.random()*11);b=2+Math.floor(Math.random()*11);a=ans*b;}
  mAns=ans;const el=$('mprob');if(el)el.textContent=`${a} ${op} ${b} = ?`;}
function spawnMathBubble(){const f=$('mfield');if(!f)return;const rect=f.getBoundingClientRect();const size=64;const left=Math.random()*Math.max(10,rect.width-size);const dur=6+Math.random()*2;
  let value;if(Math.random()<0.4){value=mAns;}else{let d;do{d=(Math.random()<0.5?-1:1)*(1+Math.floor(Math.random()*10));}while(d===0);value=Math.max(0,mAns+d);if(value===mAns)value+=1;}
  const cols=['#A7C8E8','#FFB4C0','#FFC94A','#7DD3B5','#E8D6FF'];const color=cols[Math.floor(Math.random()*cols.length)];
  const b=document.createElement('div');b.dataset.v=value;b.style.cssText=`position:absolute;left:${left}px;bottom:-${size}px;width:${size}px;height:${size}px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.9),${color});border:2.5px solid rgba(26,26,26,.6);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2';font-weight:800;font-size:22px;color:#1a1a1a;animation:bubbleRise ${dur}s linear forwards;cursor:pointer;touch-action:manipulation;user-select:none`;b.textContent=value;
  const tap=(ev)=>{ev.stopPropagation();if(!b.parentNode)return;
    if(parseInt(b.dataset.v,10)===mAns){mScore++;mStreak++;const sc=$('msc'),st=$('mst');if(sc)sc.textContent=mScore;if(st)st.textContent=mStreak;popSound();popBubble(b);const p=$('mprob');if(p){p.style.background='#7DD3B5';setTimeout(()=>{if(p)p.style.background='';},220);}genMath();}
    else{mStreak=0;const st=$('mst');if(st)st.textContent=mStreak;b.style.borderColor='#e23a5e';setTimeout(()=>{if(b.parentNode)b.style.borderColor='rgba(26,26,26,.6)';},300);}};
  b.addEventListener('click',tap);b.addEventListener('touchstart',tap,{passive:true});f.appendChild(b);
  setTimeout(()=>{if(b.parentNode)b.remove();},dur*1000+120);}
function endMathPop(){stopGames();
  screen.innerHTML=`${topbar()}<div class="pad fade" style="text-align:center"><span class="step-tag">BRAIN WORKOUT! 🧠</span>
   <div class="duo" style="margin:8px 0;gap:24px"><div><div style="font-family:'Baloo 2';font-size:40px;color:var(--grape-deep)">${mScore}</div><div style="font-weight:800;font-size:12px">got right ⭐</div></div>
     <div><div style="font-family:'Baloo 2';font-size:40px;color:var(--tangerine)">${mStreak}</div><div style="font-weight:800;font-size:12px">final streak 🔥</div></div></div>
   <button class="btn" onclick="go('mathPop')">Play again 🔢</button>
   <button class="btn ghost" onclick="go('mathPick')">Pick a different kind →</button>
   <button class="btn ghost" onclick="go('distract')">← Back to distractions</button></div>`;}

function stopTimers(){breatheTimers.forEach(t=>{clearInterval(t);clearTimeout(t);});breatheTimers=[];}
let breatheTimers=[];
function stopGames(){stopTimers();if(bpInt){clearInterval(bpInt);bpInt=null;}if(bpSpawn){clearInterval(bpSpawn);bpSpawn=null;}if(mInt){clearInterval(mInt);mInt=null;}if(mSpawn){clearInterval(mSpawn);mSpawn=null;}}

(async function(){Store.init();const saved=await Store.load();state=migrate(saved);setTheme();
  stack=[{view: !ackOK() ? 'disclaimer' : (state.onboarded?'home':'onboard')}];currentView=stack[0].view;(renderers[currentView]||renderers.home)();

})();
</script>
